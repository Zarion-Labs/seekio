<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e94560" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="#050508"/>
  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- ── Left column ── -->

  <!-- $ node seekio.js -->
  <text
    x="56" y="153"
    font-family="monospace" font-size="13" fill="#e94560"
    letter-spacing="4">$ node seekio.js</text>

  <!-- SEEKIO wordmark -->
  <text
    x="56" y="205"
    font-family="monospace" font-size="40" font-weight="900" fill="#ffffff"
    letter-spacing="2">SEEKIO</text>

  <!-- Tagline -->
  <text
    x="56" y="230"
    font-family="monospace" font-size="13" fill="#555555"
    letter-spacing="2">your claude agents, at a glance</text>

  <!-- Status dots -->
  <text x="56"  y="260" font-family="monospace" font-size="11" fill="#27c93f" letter-spacing="1">&#9679; working</text>
  <text x="172" y="260" font-family="monospace" font-size="11" fill="#ffbd2e" letter-spacing="1">&#9679; thinking</text>
  <text x="308" y="260" font-family="monospace" font-size="11" fill="#555555" letter-spacing="1">&#9679; idle</text>

  <!-- ── Right column: terminal card mockup ── -->

  <!-- Card container -->
  <rect x="1024" y="100" width="200" height="200" rx="8" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Card header label -->
  <text
    x="1040" y="124"
    font-family="monospace" font-size="9" fill="#555555"
    letter-spacing="2">seekio &#183; 3 sessions</text>

  <!-- Session row 1: working -->
  <rect x="1040" y="132" width="168" height="38" rx="4" fill="#0d0d0d"/>
  <rect x="1040" y="132" width="2"   height="38" fill="#27c93f"/>
  <text x="1052" y="147" font-family="monospace" font-size="9"  fill="#27c93f">&#9679; working</text>
  <text x="1052" y="161" font-family="monospace" font-size="10" fill="#ffffff">my-project</text>

  <!-- Session row 2: thinking -->
  <rect x="1040" y="176" width="168" height="38" rx="4" fill="#0d0d0d"/>
  <rect x="1040" y="176" width="2"   height="38" fill="#ffbd2e"/>
  <text x="1052" y="191" font-family="monospace" font-size="9"  fill="#ffbd2e">&#9679; thinking</text>
  <text x="1052" y="205" font-family="monospace" font-size="10" fill="#ffffff">api-service</text>

  <!-- Session row 3: idle -->
  <rect x="1040" y="220" width="168" height="38" rx="4" fill="#0d0d0d"/>
  <rect x="1040" y="220" width="2"   height="38" fill="#333333"/>
  <text x="1052" y="235" font-family="monospace" font-size="9"  fill="#555555">&#9679; idle</text>
  <text x="1052" y="249" font-family="monospace" font-size="10" fill="#777777">scripts</text>
</svg>
